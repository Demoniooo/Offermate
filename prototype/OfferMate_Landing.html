<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OfferMate — 60 秒拿到 HR 视角的简历诊断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FFFFFF; --paper-2:#F6F6F4; --card:#FFFFFF; --card-soft:#FAFAF8;
  --ink:#1F1F1F; --ink-2:#3E3E3C; --ink-3:#52524F; --mute:#71716D; --faint:#A6A6A2;
  --line:#EBEBE8; --line-2:#E7E7E4; --line-3:#D8D8D4;
  --green:#1F1F1F; --green-deep:#000000; --mint:#E4F222; --green-bg:#F7FAD9; --green-bd:#DCE85A;
  --amber:#8A6A1F; --amber-bg:#F8F1DE; --amber-bd:#EBDCAE;
  --orange:#B8401F; --orange-bg:#FBE9E2; --orange-bd:#EFC7B6;
  --gold:#D8DB3A;
  --sans:'Inter','MiSans','PingFang SC','HarmonyOS Sans SC','Microsoft YaHei',system-ui,sans-serif;
  --mono:'Inter','MiSans','PingFang SC',system-ui,sans-serif;
  --shadow-card:0 1px 0 rgba(0,0,0,.02),0 24px 48px -32px rgba(31,31,31,.18);
}
*{box-sizing:border-box}
::selection{background:#E4F222;color:#1F1F1F}
html{scroll-behavior:smooth}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}
.wrap{max-width:1240px;margin:0 auto;padding-left:32px;padding-right:32px}
.eyebrow{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}
.mono{font-family:var(--mono)}

/* ---------- 动效 ---------- */
html.js .rv{opacity:0;transform:translateY(14px);transition:opacity .6s ease,transform .6s ease}
html.js .rv.in{opacity:1;transform:none}
@media (prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  html.js .rv{opacity:1;transform:none;transition:none}
  *{animation:none!important;transition:none!important}
}

/* ---------- NAV ---------- */
nav{position:sticky;top:0;z-index:50;background:rgba(247,245,239,.92);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;gap:32px;padding-top:14px;padding-bottom:14px}
.brand{display:flex;align-items:center;gap:10px}
.brand span{font-size:17px;font-weight:600;letter-spacing:-.01em}
.nav-links{display:flex;gap:28px;font-size:14px;color:var(--ink-2);font-weight:500}
.nav-links a{padding:4px 0;border-bottom:2px solid transparent;transition:border-color .15s,color .15s}
.nav-links a:hover{color:var(--ink);border-color:var(--mint)}
.spacer{flex:1}
.lang{display:flex;align-items:center;gap:4px;padding:3px;background:#EFEBDF;border:1px solid #E0DBCB;border-radius:999px;font-size:12px}
.lang button{padding:5px 11px;border:none;border-radius:999px;background:transparent;color:var(--mute);font-weight:600;white-space:nowrap;transition:background .15s,color .15s}
.lang button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(31,31,31,.08)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;font-weight:600;border:1px solid transparent;transition:transform .15s,box-shadow .15s,background .15s,border-color .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 8px 20px -10px rgba(31,31,31,.18)}
.btn-primary:hover{background:var(--green-deep);box-shadow:0 10px 24px -10px rgba(31,31,31,.22)}
.btn-ghost{background:#fff;color:var(--ink);border-color:var(--line-3)}
.btn-ghost:hover{border-color:var(--ink);background:#fff}
.btn-sm{padding:8px 16px;font-size:13.5px}
.btn-lg{padding:13px 22px;font-size:15px}

/* ---------- HERO ---------- */
.hero{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:64px;align-items:center;padding-top:88px;padding-bottom:56px}
.badge{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:999px;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--green)}
.badge i{width:6px;height:6px;border-radius:50%;background:var(--green);animation:om-pulse 2s ease-in-out infinite}
@keyframes om-pulse{0%,100%{opacity:.5}50%{opacity:1}}
h1{margin:22px 0 0;font-size:clamp(36px,4.6vw,58px);line-height:1.12;letter-spacing:-.035em;font-weight:700;text-wrap:balance}
.accent{color:var(--green);position:relative;white-space:nowrap}
.accent svg{position:absolute;left:0;right:0;bottom:-.08em;width:100%;height:.22em;overflow:visible}
.accent path{stroke:var(--mint);stroke-width:5;fill:none;stroke-linecap:round}
.hero-sub{margin:20px 0 0;max-width:520px;font-size:16.5px;line-height:1.65;color:var(--ink-3);text-wrap:pretty}
.hero-ctas{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
.hero-meta{display:flex;gap:18px;margin-top:18px;font-size:13px;color:var(--mute);flex-wrap:wrap}
.hero-meta span{display:inline-flex;align-items:center;gap:6px}
.hero-meta svg{flex:none}

/* hero 报告卡 */
.demo-card{background:var(--card);border:1px solid var(--line-2);border-radius:18px;padding:24px;box-shadow:var(--shadow-card);position:relative}
.demo-card .corner{position:absolute;top:-12px;left:22px;padding:5px 11px;background:var(--ink);color:#fff;border-radius:999px;font-family:var(--mono);font-size:11px;letter-spacing:.06em}
.demo-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-top:4px}
.demo-head h3{margin:0;font-size:16.5px;font-weight:600}
.demo-head p{margin:3px 0 0;font-family:var(--mono);font-size:11.5px;color:var(--mute)}
.score{display:flex;align-items:baseline;gap:3px}
.score b{font-family:var(--mono);font-size:42px;font-weight:500;color:var(--green);line-height:1;letter-spacing:-.04em}
.score span{font-family:var(--mono);font-size:14px;color:var(--faint)}
.demo-body{display:grid;grid-template-columns:1.05fr 1fr;gap:18px;align-items:center;margin-top:14px}
.dim-rows{display:flex;flex-direction:column;gap:11px}
.dim-row .t{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.dim-row .t b{font-size:12.5px;font-weight:500;color:var(--ink-2)}
.dim-row .t span{font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600}
.bar{height:6px;background:#EFEBDF;border-radius:999px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--ink);border-radius:999px;width:0;transition:width 1s cubic-bezier(.2,.7,.2,1) .2s}
.in .bar i{width:var(--w)}
.demo-foot{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px dashed var(--line);flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 9px;border-radius:999px;border:1px solid}
.chip.warn{color:var(--amber);background:var(--amber-bg);border-color:var(--amber-bd)}
.chip.ok{color:var(--green);background:var(--green-bg);border-color:var(--green-bd)}
.view-link{margin-left:auto;font-size:12.5px;font-weight:600;color:var(--green)}
.view-link:hover{text-decoration:underline}
.radar text{font-family:var(--sans);font-size:13px;font-weight:500;fill:var(--ink)}
.radar .grid{fill:none;stroke:var(--line);stroke-width:1}
.radar .shape{fill:var(--mint);fill-opacity:.45;stroke:var(--ink);stroke-width:1.8;stroke-linejoin:round}
.radar circle{fill:var(--green)}

/* ---------- 信任条 ---------- */
.trust{border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--paper-2)}
.trust-in{display:grid;grid-template-columns:auto repeat(4,1fr);gap:28px;align-items:center;padding-top:22px;padding-bottom:22px}
.trust-label{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute)}
.stat b{display:block;font-family:var(--mono);font-size:22px;font-weight:500;color:var(--ink);letter-spacing:-.02em}
.stat span{display:block;margin-top:2px;font-size:12.5px;color:var(--mute)}

/* ---------- 通用 section 头 ---------- */
.sec{padding-top:110px}
.sec-head{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;margin-bottom:52px}
.sec-head h2{margin:0;font-size:clamp(30px,3.4vw,42px);line-height:1.15;letter-spacing:-.02em;font-weight:600;max-width:720px;text-wrap:balance}
.sec-head>p{margin:0 0 4px;max-width:380px;font-size:15px;line-height:1.6;color:var(--ink-3);text-wrap:pretty}

/* ---------- 痛点 ---------- */
.pains-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.pain{background:var(--card-soft);padding:36px 32px 40px;display:flex;flex-direction:column;gap:18px;min-height:280px;transition:background .2s}
.pain:hover{background:#fff}
.pain-top{display:flex;justify-content:space-between;align-items:flex-start}
.pain-num{font-family:var(--mono);font-size:56px;font-weight:500;color:var(--gold);line-height:1;letter-spacing:-.04em}
.pain-tag{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--amber);letter-spacing:.05em;text-transform:uppercase;padding:4px 8px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:999px}
.pain h3{margin:0 0 10px;font-size:22px;font-weight:600;letter-spacing:-.015em}
.pain p{margin:0;font-size:14.5px;line-height:1.65;color:var(--ink-3);text-wrap:pretty}
.pain-stat{margin-top:auto;font-family:var(--mono);font-size:12px;color:var(--mute)}

/* ---------- 功能 ---------- */
.feat{display:grid;grid-template-columns:minmax(0,.85fr) minmax(0,1.15fr);gap:64px;align-items:center;padding-top:64px;padding-bottom:64px}
.feat.flip{grid-template-columns:minmax(0,1.15fr) minmax(0,.85fr)}
.feat-alt{background:var(--paper-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.feat h3{margin:0;font-size:30px;font-weight:600;letter-spacing:-.02em}
.feat .sub{margin:6px 0 0;font-family:var(--mono);font-size:13px;color:var(--green)}
.feat .body{margin:16px 0 0;font-size:15px;line-height:1.7;color:var(--ink-3);max-width:440px;text-wrap:pretty}
.feat-chips{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap}
.feat-chips span{font-family:var(--mono);font-size:11.5px;font-weight:500;color:var(--ink-2);padding:5px 11px;background:#fff;border:1px solid var(--line-3);border-radius:999px}
.mock{background:var(--card);border:1px solid var(--line-2);border-radius:16px;padding:22px;box-shadow:var(--shadow-card);position:relative}
.mock-label{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--mute);margin-bottom:12px}

/* F1 简历 mockup */
.cv h4{margin:0;font-size:15.5px;font-weight:600}
.cv .meta{margin:2px 0 0;font-family:var(--mono);font-size:11.5px;color:var(--mute)}
.cv ul{margin:14px 0 0;padding:0 0 0 18px;display:flex;flex-direction:column;gap:9px;font-size:13.5px;line-height:1.55;color:var(--ink-2)}
.hl{background:var(--amber-bg);border-bottom:2px solid var(--amber-bd);padding:1px 3px;border-radius:3px}
.note{position:absolute;background:var(--ink);color:#EDEFF2;border-radius:10px;padding:9px 12px;width:218px;font-size:12px;line-height:1.5;box-shadow:0 14px 30px -14px rgba(31,31,31,.5)}
.note b{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mint);margin-bottom:3px}
.note::before{content:"";position:absolute;left:-5px;top:14px;width:10px;height:10px;background:var(--ink);transform:rotate(45deg)}
.n1{right:-26px;top:48px}
.n2{right:-26px;top:148px}
.rewrite{margin-top:16px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:10px;padding:12px 14px}
.rewrite b{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:5px}
.rewrite p{margin:0;font-size:13px;line-height:1.55;color:#3F4708}

/* F2 匹配 mockup */
.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;position:relative}
.match-badge{position:absolute;left:50%;top:-14px;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:999px;padding:6px 13px;font-family:var(--mono);font-size:12px;display:flex;gap:6px;align-items:baseline;z-index:2}
.match-badge b{color:var(--mint);font-size:15px}
.mini{background:#fff;border:1px solid var(--line-2);border-radius:12px;padding:16px}
.mini h5{margin:0 0 2px;font-size:13.5px;font-weight:600}
.mini .meta{font-family:var(--mono);font-size:10.5px;color:var(--mute)}
.jd-items{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.jd-it{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:500;padding:7px 10px;border-radius:8px;border:1px solid}
.jd-it i{width:7px;height:7px;border-radius:50%}
.jd-it span{margin-left:auto;font-family:var(--mono);font-size:10.5px;opacity:.85}
.cv-items{margin-top:12px;display:flex;flex-direction:column;gap:7px}
.cv-items div{font-size:12.5px;color:var(--ink-2);padding:7px 10px;background:var(--card-soft);border:1px solid var(--line);border-radius:8px}

/* F3 面试 mockup */
.chat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.chat-head .q{font-size:13.5px;font-weight:600}
.pressure{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--orange);background:var(--orange-bg);border:1px solid var(--orange-bd);padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
.pressure i{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:om-pulse 1.6s infinite}
.msg{display:flex;gap:10px;margin-top:12px}
.msg .av{flex:none;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600}
.msg.ai .av{background:var(--ink);color:var(--mint)}
.msg.me{flex-direction:row-reverse}
.msg.me .av{background:#EFEBDF;color:var(--ink-2)}
.bubble{max-width:78%;padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.55}
.msg.ai .bubble{background:var(--card-soft);border:1px solid var(--line)}
.msg.me .bubble{background:var(--green-bg);border:1px solid var(--green-bd);color:#3F4708}
.flag{display:inline-block;margin-top:6px;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--orange);background:var(--orange-bg);border:1px solid var(--orange-bd);padding:2px 7px;border-radius:999px}
.fu-tag{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--green);background:var(--green-bg);border:1px solid var(--green-bd);padding:2px 7px;border-radius:999px;display:inline-block;margin-bottom:6px}
.typing{display:inline-flex;gap:4px;padding:10px 13px;background:var(--card-soft);border:1px solid var(--line);border-radius:12px}
.typing i{width:5px;height:5px;border-radius:50%;background:var(--faint);animation:om-pulse 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
.depth{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px dashed var(--line);font-family:var(--mono);font-size:11px;color:var(--mute)}
.depth b{color:var(--ink)}

/* ---------- CTA ---------- */
.cta{margin:110px 0 0;padding-bottom:100px}
.cta-panel{position:relative;overflow:hidden;background:var(--ink);color:#F2F4F6;border-radius:22px;padding:64px 56px}
.cta-panel .eyebrow{color:var(--mint)}
.cta-panel h2{margin:0;font-size:clamp(28px,3.4vw,42px);font-weight:600;letter-spacing:-.02em;max-width:640px;text-wrap:balance}
.cta-panel p{margin:16px 0 0;max-width:520px;font-size:15.5px;line-height:1.65;color:#B9C2CC}
.cta-panel .hero-ctas{margin-top:28px}
.cta-panel .btn-primary{background:var(--mint);color:var(--ink);box-shadow:none}
.cta-panel .btn-primary:hover{background:#92E0BE}
.cta-panel .btn-ghost{background:transparent;color:#F2F4F6;border-color:#3A4A5A}
.cta-panel .btn-ghost:hover{border-color:#7DD3AE}
.cta-meta{display:flex;gap:18px;margin-top:18px;font-family:var(--mono);font-size:12px;color:#8E9AA6;flex-wrap:wrap}
.cta-bg{position:absolute;right:-40px;top:-60px;opacity:.1;pointer-events:none}
.cta-bg .grid{stroke:#fff}
.cta-bg .shape{fill:var(--mint);fill-opacity:.25;stroke:var(--mint)}

/* ---------- FOOTER ---------- */
footer{border-top:1px solid var(--line);background:var(--paper-2)}
.foot-in{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:40px;padding-top:52px;padding-bottom:36px}
.foot-in .tag{margin:14px 0 0;font-size:13.5px;line-height:1.6;color:var(--ink-3);max-width:300px}
.foot-in .mail{margin-top:10px;font-family:var(--mono);font-size:12.5px;color:var(--mute)}
.fcol h5{margin:0 0 14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mute)}
.fcol a{display:block;font-size:13.5px;color:var(--ink-2);padding:4px 0}
.fcol a:hover{color:var(--green)}
.foot-bar{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:18px;padding-bottom:24px;font-family:var(--mono);font-size:11.5px;color:var(--mute)}
.status{display:inline-flex;align-items:center;gap:7px}
.status i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:om-pulse 2s infinite}

/* ---------- 响应式 ---------- */
@media (max-width:1020px){
  .hero{grid-template-columns:1fr;gap:48px;padding-top:64px}
  .feat,.feat.flip{grid-template-columns:1fr;gap:40px}
  .feat.flip .feat-copy{order:-1}
  .trust-in{grid-template-columns:1fr 1fr;row-gap:18px}
  .trust-label{grid-column:1/-1}
  .pains-grid{grid-template-columns:1fr}
  .sec-head{flex-direction:column;align-items:flex-start;gap:14px}
  .foot-in{grid-template-columns:1fr 1fr}
  .n1,.n2{position:static;width:auto;margin-top:12px}
  .note::before{display:none}
}
@media (max-width:680px){
  .wrap{padding-left:20px;padding-right:20px}
  .nav-links{display:none}
  .demo-body{grid-template-columns:1fr}
  .match-wrap{grid-template-columns:1fr}
  .trust-in{grid-template-columns:1fr 1fr}
  .foot-in{grid-template-columns:1fr}
  .cta-panel{padding:44px 28px}
}
</style>
</head>
<body>

<!-- =================== NAV =================== -->
<nav>
  <div class="wrap nav-in">
    <a class="brand" href="#" aria-label="OfferMate">
      <svg width="28" height="28" viewBox="0 0 28 28" aria-hidden="true">
        <rect width="28" height="28" rx="7" fill="#1F1F1F"/>
        <circle cx="13" cy="15" r="6.2" fill="none" stroke="#FFF" stroke-width="1.6"/>
        <path d="M 9.5 18.5 L 20 8 M 20 8 L 14.5 8 M 20 8 L 20 13.5" stroke="#E4F222" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>OfferMate</span>
    </a>
    <div class="nav-links">
      <a href="#features" data-i18n="nav_features"></a>
      <a href="#pains" data-i18n="nav_pains"></a>
      <a href="#pricing" data-i18n="nav_pricing"></a>
      <a href="#partners" data-i18n="nav_partners"></a>
    </div>
    <div class="spacer"></div>
    <div class="lang" role="group" aria-label="Language">
      <button id="zhBtn" class="on" onclick="setLang('zh')">中文</button>
      <button id="enBtn" onclick="setLang('en')">EN</button>
    </div>
    <a class="btn btn-primary btn-sm" href="OfferMate_Diagnosis.html" data-i18n="nav_cta"></a>
  </div>
</nav>

<!-- =================== HERO =================== -->
<section class="wrap hero">
  <div class="rv">
    <span class="badge"><i></i><span data-i18n="hero_badge"></span></span>

const JD_COLORS = {ok:{bg:'#F7FAD9',bd:'#DCE85A',fg:'#4A5207'},weak:{bg:'#F8F1DE',bd:'#EBDCAE',fg:'#8A6A1F'},miss:{bg:'#FBE9E2',bd:'#EFC7B6',fg:'#B8401F'}};
let lang = 'zh';
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function render(){
  const t = I18N[lang];
  document.documentElement.lang = lang==='zh' ? 'zh-CN' : 'en';
  document.title = lang==='zh' ? 'OfferMate — 60 秒拿到 HR 视角的简历诊断' : "OfferMate — resume feedback from an HR's POV, in 60s";
  document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.dataset.i18n; if(t[k]!==undefined) el.textContent=t[k]; });
  document.getElementById('zhBtn').classList.toggle('on', lang==='zh');
  document.getElementById('enBtn').classList.toggle('on', lang==='en');

  document.getElementById('heroDims').innerHTML = t.dim_rows.map(r=>
    `<div class="dim-row"><div class="t"><b>${esc(r.label)}</b><span>${r.score}</span></div><div class="bar"><i style="--w:${r.score}%"></i></div></div>`).join('');

  document.getElementById('painsGrid').innerHTML = t.pains.map(p=>
    `<div class="pain"><div class="pain-top"><span class="pain-num">${p.num}</span><span class="pain-tag">${esc(p.tag)}</span></div>
     <div><h3>${esc(p.title)}</h3><p>${esc(p.body)}</p></div><div class="pain-stat">${esc(p.stat)}</div></div>`).join('');

  [['f1Chips',t.f1_chips],['f2Chips',t.f2_chips],['f3Chips',t.f3_chips]].forEach(([id,arr])=>{
    document.getElementById(id).innerHTML = arr.map(c=>`<span>${esc(c)}</span>`).join('');
  });

  document.getElementById('jdItems').innerHTML = t.jd_items.map(j=>{const c=JD_COLORS[j.k];
    return `<div class="jd-it" style="background:${c.bg};border-color:${c.bd};color:${c.fg}"><i style="background:${c.fg}"></i>${esc(j.label)}<span>${esc(j.status)}</span></div>`;}).join('');

  document.getElementById('cvItems').innerHTML = t.resume_items.map(i=>`<div>${esc(i)}</div>`).join('');

  t.footer_cols.forEach((col,i)=>{
    document.getElementById('fcol'+i).innerHTML = `<h5>${esc(col.title)}</h5>` + col.items.map(it=>`<a href="#">${esc(it)}</a>`).join('');
  });
}
function setLang(l){ lang=l; render(); }
render();

/* 滚动进场 */
const io = new IntersectionObserver(es=>es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} }),{threshold:0,rootMargin:'0px 0px -8% 0px'});
document.querySelectorAll('.rv').forEach(el=>io.observe(el));
</script>
