<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OfferMate — 简历诊断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FFFFFF; --paper-2:#F6F6F4; --card:#FFFFFF; --card-soft:#FAFAF8;
  --ink:#1F1F1F; --ink-2:#3E3E3C; --ink-3:#52524F; --mute:#71716D; --faint:#A6A6A2;
  --line:#EBEBE8; --line-2:#E7E7E4; --line-3:#D8D8D4;
  --green:#1F1F1F; --green-deep:#000000; --mint:#E4F222; --green-bg:#F7FAD9; --green-bd:#DCE85A;
  --amber:#8A6A1F; --amber-bg:#F8F1DE; --amber-bd:#EBDCAE;
  --orange:#B8401F; --orange-bg:#FBE9E2; --orange-bd:#EFC7B6;
  --sans:'Inter','MiSans','PingFang SC','HarmonyOS Sans SC','Microsoft YaHei',system-ui,sans-serif;
  --mono:'Inter','MiSans','PingFang SC',system-ui,sans-serif;
  --shadow-card:0 1px 0 rgba(0,0,0,.02),0 24px 48px -32px rgba(31,31,31,.16);
}
*{box-sizing:border-box}
::selection{background:#E4F222;color:#1F1F1F}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}
[hidden]{display:none!important}
.wrap{margin:0 auto;padding-left:32px;padding-right:32px}
.eyebrow{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--green);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.mono{font-family:var(--mono)}
@keyframes om-pulse{0%,100%{opacity:.45}50%{opacity:1}}
@keyframes om-spin{to{transform:rotate(360deg)}}
@keyframes om-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.appear{animation:om-up .5s ease both}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- 工具栏 NAV ---------- */
nav{position:sticky;top:0;z-index:50;background:rgba(247,245,239,.92);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line)}
.nav-in{max-width:1140px;display:flex;align-items:center;gap:18px;padding-top:12px;padding-bottom:12px}
.brand{display:flex;align-items:center;gap:9px}
.brand b{font-size:16px;font-weight:600;letter-spacing:-.01em}
.tool-label{font-family:var(--mono);font-size:11.5px;color:var(--mute);padding-left:16px;border-left:1px solid var(--line-3)}
.steps{margin:0 auto;display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:500;color:var(--faint)}
.stp{display:flex;align-items:center;gap:7px}
.stp i{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line-3);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10.5px;font-style:normal}
.stp.on{color:var(--ink)}
.stp.on i{background:var(--ink);border-color:var(--ink);color:var(--mint)}
.stp-line{width:26px;height:1px;background:var(--line-3)}
.lang{display:flex;align-items:center;gap:4px;padding:3px;background:#EFEBDF;border:1px solid #E0DBCB;border-radius:999px;font-size:12px}
.lang button{padding:4px 10px;border:none;border-radius:999px;background:transparent;color:var(--mute);font-weight:600}
.lang button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(31,31,31,.08)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;font-weight:600;border:1px solid transparent;transition:transform .15s,box-shadow .15s,background .15s,border-color .15s,opacity .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 8px 20px -10px rgba(31,31,31,.18)}
.btn-primary:hover{background:var(--green-deep)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:#fff;color:var(--ink);border-color:var(--line-3)}
.btn-ghost:hover{border-color:var(--ink)}
.btn-sm{padding:8px 14px;font-size:13px}
.btn-lg{padding:12px 20px;font-size:14.5px}

/* ---------- STEP 01 输入 ---------- */
#phase-input .wrap{max-width:1080px;padding-top:56px;padding-bottom:90px}
.in-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:26px;flex-wrap:wrap}
.in-head h1{margin:0;font-size:clamp(26px,3.2vw,34px);font-weight:600;letter-spacing:-.02em;line-height:1.2}
.in-head p{margin:10px 0 0;max-width:620px;font-size:14.5px;line-height:1.6;color:var(--ink-3)}
.input-card{background:var(--card);border:1px solid var(--line-2);border-radius:16px;box-shadow:var(--shadow-card);overflow:hidden}
.input-grid{display:grid;grid-template-columns:1.35fr 1fr}
.field{padding:22px 24px}
.field + .field{border-left:1px solid var(--line)}
.f-label{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.f-label .num{width:20px;height:20px;border-radius:6px;background:var(--ink);color:var(--mint);font-family:var(--mono);font-size:11px;display:flex;align-items:center;justify-content:center}
.f-label b{font-size:14px;font-weight:600}
.tagx{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2.5px 7px;border-radius:999px;border:1px solid}
.tagx.req{color:var(--orange);background:var(--orange-bg);border-color:var(--orange-bd)}
.tagx.opt{color:var(--mute);background:var(--paper-2);border-color:var(--line-3)}
.count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
textarea{width:100%;border:1px solid var(--line-3);border-radius:10px;background:var(--card-soft);padding:13px 14px;font-family:var(--sans);font-size:13.5px;line-height:1.6;color:var(--ink);resize:vertical;transition:border-color .15s,box-shadow .15s}
textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(31,31,31,.12);background:#fff}
textarea::placeholder{color:var(--faint)}
#resume{min-height:300px}
#jd{min-height:178px}
.tips{display:flex;gap:14px;margin-top:10px;font-size:12px;color:var(--mute);flex-wrap:wrap}
.tips span{display:inline-flex;align-items:center;gap:5px}
.opts-label{font-family:var(--mono);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--mute);margin:18px 0 10px}
.opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card-soft);cursor:pointer;user-select:none}
.opt + .opt{margin-top:8px}
.opt input{accent-color:var(--green);width:15px;height:15px;cursor:pointer}
.opt b{font-size:13px;font-weight:600}
.opt span{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.input-foot{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 24px;border-top:1px solid var(--line);background:var(--card-soft);flex-wrap:wrap}
.privacy{display:flex;gap:14px;font-size:12px;color:var(--mute);flex-wrap:wrap}
.privacy span{display:inline-flex;align-items:center;gap:5px}
.perks{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
.perk{background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.perk b{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--green);margin-bottom:6px}
.perk p{margin:0;font-size:12.5px;line-height:1.6;color:var(--ink-3)}

/* ---------- LOADING ---------- */
#phase-loading .wrap{max-width:680px;padding-top:96px;padding-bottom:120px}
.load-card{background:var(--card);border:1px solid var(--line-2);border-radius:16px;box-shadow:var(--shadow-card);padding:36px 36px 24px;text-align:center}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--green-bg);border-top-color:var(--green);margin:0 auto 18px;animation:om-spin 1s linear infinite}
.load-card h2{margin:0;font-size:21px;font-weight:600}
.load-card .sub{margin:8px 0 0;font-size:13.5px;color:var(--ink-3)}
.load-steps{margin:26px 0 0;text-align:left;display:flex;flex-direction:column;gap:0}
.lstep{display:flex;align-items:center;gap:12px;padding:11px 4px;border-top:1px dashed var(--line)}
.lstep .ic{flex:none;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:1.5px solid var(--line-3);color:transparent}
.lstep b{font-size:13.5px;font-weight:600;color:var(--faint)}
.lstep span{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
.lstep.done .ic{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.lstep.done b{color:var(--ink-2)}
.lstep.active .ic{border-color:var(--green);position:relative}
.lstep.active .ic::after{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);animation:om-pulse 1s infinite}
.lstep.active b{color:var(--ink)}
.load-foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:14px;border-top:1px solid var(--line);font-family:var(--mono);font-size:11.5px;color:var(--mute)}
.load-foot a{color:var(--ink-3);text-decoration:underline;cursor:pointer}

/* ---------- REPORT ---------- */
#phase-report .wrap{max-width:1140px;padding-top:40px;padding-bottom:80px}
.rep-bar{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.rep-bar h1{margin:0;font-size:clamp(26px,3.2vw,36px);font-weight:600;letter-spacing:-.02em;line-height:1.2}
.rep-meta{margin-top:8px;display:flex;gap:12px;font-family:var(--mono);font-size:12px;color:var(--mute);flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--line-2);border-radius:16px;padding:30px;box-shadow:var(--shadow-card)}
.sum-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.2fr);gap:36px;align-items:center}
.big-score{display:flex;align-items:baseline;gap:4px;margin-top:4px}
.big-score b{font-family:var(--mono);font-size:92px;font-weight:500;color:var(--green);line-height:1;letter-spacing:-.04em}
.big-score span{font-family:var(--mono);font-size:22px;color:var(--faint)}
.level{margin-top:12px;display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:999px;font-size:12.5px;font-weight:600;color:var(--green)}
.level i{width:6px;height:6px;background:var(--green);border-radius:50%}
.blurb{margin:18px 0 0;font-size:14.5px;line-height:1.65;color:var(--ink-2);max-width:400px}
.kpis{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:400px}
.kpi{padding:12px 14px;border-radius:10px;border:1px solid}
.kpi.warn{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber)}
.kpi.ok{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.kpi small{display:block;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.kpi b{font-family:var(--mono);font-size:24px;font-weight:500}
.kpi span{font-size:11.5px;margin-left:3px}
.sum-right{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
.radar text{font-family:var(--sans);font-size:13px;font-weight:500;fill:var(--ink)}
.radar .grid{fill:none;stroke:var(--line);stroke-width:1}
.radar .shape{fill:var(--mint);fill-opacity:.45;stroke:var(--ink);stroke-width:1.8;stroke-linejoin:round}
.radar circle{fill:var(--green)}
.dim-rows{display:flex;flex-direction:column;gap:13px}
.dim-row .t{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.dim-row .t b{font-size:13px;font-weight:500;color:var(--ink-2)}
.dim-row .t span{font-family:var(--mono);font-size:12px;font-weight:600}
.bar{height:6px;background:#EFEBDF;border-radius:999px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;width:0;transition:width .9s cubic-bezier(.2,.7,.2,1) .15s}
.shown .bar i{width:var(--w)}
.dim-note{margin-top:4px;font-size:11.5px;color:var(--mute)}

.sec-row{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin:54px 0 20px;flex-wrap:wrap}
.sec-row h2{margin:0;font-size:24px;font-weight:600;letter-spacing:-.015em}
.sec-row .right{font-family:var(--mono);font-size:12px;color:var(--mute)}
.sec-row .num{font-family:var(--mono);font-size:12px;color:var(--green);margin-right:10px}

.findings{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.finding{background:var(--card);border:1px solid var(--line-2);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:12px}
.find-top{display:flex;align-items:center;gap:8px}
.sev{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.05em;padding:3px 8px;border-radius:999px;border:1px solid}
.find-top span{font-family:var(--mono);font-size:11px;color:var(--mute);margin-left:auto}
.finding h3{margin:0;font-size:15.5px;font-weight:600;line-height:1.4}
.finding p{margin:0;font-size:13px;line-height:1.6;color:var(--ink-3)}
.affected{margin-top:auto;font-family:var(--mono);font-size:11px;color:var(--mute);padding-top:10px;border-top:1px dashed var(--line)}

.rw{background:var(--card);border:1px solid var(--line-2);border-radius:14px;overflow:hidden}
.rw + .rw{margin-top:12px}
.rw-head{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--card-soft);border-bottom:1px solid var(--line);font-size:12.5px;flex-wrap:wrap}
.rw-head .id{font-family:var(--mono);font-weight:600;color:var(--green)}
.rw-head .sec{color:var(--ink-2);font-weight:500}
.rw-head .tag{font-family:var(--mono);font-size:10.5px;color:var(--mute);padding:2px 8px;border:1px solid var(--line-3);border-radius:999px}
.rw-head .imp{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green)}
.rw-grid{display:grid;grid-template-columns:1fr 1fr}
.rw-cell{padding:16px 18px}
.rw-cell + .rw-cell{border-left:1px solid var(--line)}
.rw-cell small{display:block;font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px}
.rw-cell.before small{color:var(--orange)}
.rw-cell.after{background:#FCFDF4}
.rw-cell.after small{color:var(--green)}
.rw-cell p{margin:0;font-size:13.5px;line-height:1.6;color:var(--ink-2)}
.rw-cell.after p{color:#3F4708}
.mini-chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.mini-chips span{font-family:var(--mono);font-size:10px;font-weight:600;padding:2.5px 8px;border-radius:999px;border:1px solid}
.mc-issue{color:var(--orange);background:var(--orange-bg);border-color:var(--orange-bd)}
.mc-win{color:var(--green);background:var(--green-bg);border-color:var(--green-bd)}

.match-row{display:flex;align-items:baseline;gap:8px}
.match-row b{font-family:var(--mono);font-size:26px;color:var(--green)}
.buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.bucket{background:var(--card);border:1px solid var(--line-2);border-radius:14px;padding:18px}
.bucket-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.bucket-h b{font-size:14px;font-weight:600}
.bucket-h span{font-family:var(--mono);font-size:11.5px;color:var(--mute)}
.bk-chips{display:flex;flex-wrap:wrap;gap:7px}
.bk-chips span{font-size:12px;font-weight:500;padding:5px 11px;border-radius:999px;border:1px solid}
.recommend{margin-top:14px;background:var(--amber-bg);border:1px solid var(--amber-bd);border-radius:14px;padding:18px 20px}
.recommend b{display:block;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--amber);margin-bottom:7px}
.recommend p{margin:0;font-size:13.5px;line-height:1.7;color:#6B5414}

.next{margin-top:56px;background:var(--ink);color:#F2F4F6;border-radius:18px;padding:40px 44px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.next .eyebrow{color:var(--mint);margin-bottom:8px}
.next h2{margin:0;font-size:24px;font-weight:600;letter-spacing:-.015em;max-width:520px}
.next p{margin:10px 0 0;font-size:13.5px;line-height:1.65;color:#B9C2CC;max-width:520px}
.next-btns{margin-left:auto;display:flex;flex-direction:column;gap:10px}
.next .btn-primary{background:var(--mint);color:var(--ink);box-shadow:none}
.next .btn-primary:hover{background:#92E0BE}
.next .btn-ghost{background:transparent;color:#F2F4F6;border-color:#3A4A5A}
.next .btn-ghost:hover{border-color:var(--mint)}

/* toast */
#toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:99;box-shadow:0 14px 30px -10px rgba(31,31,31,.5)}
#toast.show{opacity:1;transform:translateX(-50%)}

/* ---------- 响应式 ---------- */
@media (max-width:980px){
  .steps{display:none}
  .input-grid{grid-template-columns:1fr}
  .field + .field{border-left:none;border-top:1px solid var(--line)}
  .sum-grid{grid-template-columns:1fr}
  .findings,.buckets{grid-template-columns:1fr}
  .perks{grid-template-columns:1fr}
  .rw-grid{grid-template-columns:1fr}
  .rw-cell + .rw-cell{border-left:none;border-top:1px solid var(--line)}
  .next{padding:32px 26px}
  .next-btns{margin-left:0;flex-direction:row;flex-wrap:wrap}
}
@media (max-width:680px){
  .wrap{padding-left:20px;padding-right:20px}
  .tool-label{display:none}
  .sum-right{grid-template-columns:1fr}
}
/* ---------- 打印（导出 PDF）---------- */
@media print{
  nav,#phase-input,#phase-loading,.next,.rep-bar .btns,#toast{display:none!important}
  body{background:#fff}
  .card,.finding,.rw,.bucket{box-shadow:none;break-inside:avoid}
  #phase-report .wrap{padding-top:0}
}
</style>
</head>
<body>

<nav>
  <div class="wrap nav-in">
    <a class="brand" href="OfferMate_Landing.html" aria-label="OfferMate 首页">
      <svg width="26" height="26" viewBox="0 0 28 28" aria-hidden="true"><rect width="28" height="28" rx="7" fill="#1F1F1F"/><circle cx="13" cy="15" r="6.2" fill="none" stroke="#FFF" stroke-width="1.6"/><path d="M 9.5 18.5 L 20 8 M 20 8 L 14.5 8 M 20 8 L 20 13.5" stroke="#E4F222" stroke-width="1.7" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <b>OfferMate</b>
    </a>
    <span class="tool-label" data-i18n="tool_label"></span>
    <div class="steps" aria-hidden="true">
      <span class="stp on" id="stp1"><i>1</i><span data-i18n="step1_label"></span></span>
      <span class="stp-line"></span>
      <span class="stp" id="stp2"><i>2</i><span data-i18n="step2_label"></span></span>
      <span class="stp-line"></span>
      <span class="stp"><i>3</i><span data-i18n="step3_label"></span></span>
    </div>
    <div class="lang" role="group" aria-label="Language">
      <button id="zhBtn" class="on" onclick="setLang('zh')">中文</button>
      <button id="enBtn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<!-- ============ PHASE: INPUT ============ -->
<section id="phase-input">
  <div class="wrap">
    <div class="in-head">
      <div>
        <div class="eyebrow" data-i18n="input_eyebrow"></div>
        <h1 data-i18n="input_title"></h1>
        <p data-i18n="input_sub"></p>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadSample(false)"><span data-i18n="load_sample_btn"></span> ↓</button>
    </div>

    <div class="input-card">
      <div class="input-grid">
        <div class="field">
          <div class="f-label">
            <span class="num">1</span><b data-i18n="resume_field_label"></b>
            <span class="tagx req" data-i18n="required_tag"></span>
            <span class="count" id="resumeCount">0</span>
          </div>
          <textarea id="resume" oninput="onResumeInput()"></textarea>
          <div class="tips">

    {title:'Soft signals',hits:3,total:4,items:[['Communication','ok'],['Drive','ok'],['Cross-team','ok'],['Resilience','weak']]},
    {title:'Hidden keywords',hits:2,total:4,items:[['creators/sellers','miss'],['Ops SOP','miss'],['e-Commerce','weak'],['Community ops','ok']]}],
  recommend_label:'Recommendation',
  recommend_body:'Two priorities: (1) Reframe your existing ops internship around data / experiments / SQL — even Excel work counts if you spell out the "split by X → spot Y → validate" chain. (2) Add one course / project showing SQL usage — your DB class or any query you ran during the internship will do.',
  next_eyebrow:'STEP 03',
  next_title:'Now drill it: a mock interview for the same role',
  next_sub:"8–10 questions, 2–3 layers of follow-up, generated from this resume + JD. You'll get a debrief in the same side-by-side format.",
  next_btn_primary:'Start mock interview',next_btn_secondary:'Back to edit resume',
  toast_msg:'Mock interview ships in MVP week 2 — stay tuned',
  sample_resume:`Wang  ·  Renmin University, Information Mgmt, Junior

  sample_jd:`Product Ops Intern  ·  ByteDance  ·  Douyin e-Commerce

const COLORS={ok:{bg:'#F7FAD9',bd:'#DCE85A',fg:'#4A5207'},weak:{bg:'#F8F1DE',bd:'#EBDCAE',fg:'#8A6A1F'},miss:{bg:'#FBE9E2',bd:'#EFC7B6',fg:'#B8401F'}};
let lang='zh', phase='input', loadStep=0, timers=[];
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function render(){
  const t=I18N[lang];
  document.documentElement.lang = lang==='zh'?'zh-CN':'en';
  document.title = lang==='zh'?'OfferMate — 简历诊断':'OfferMate — Resume diagnosis';
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.dataset.i18n;if(typeof t[k]==='string')el.textContent=t[k];});
  $('zhBtn').classList.toggle('on',lang==='zh');
  $('enBtn').classList.toggle('on',lang==='en');
  $('resume').placeholder=t.resume_placeholder;
  $('jd').placeholder=t.jd_placeholder;
  onResumeInput();

  $('perks').innerHTML=t.perks.map(p=>`<div class="perk"><b>${esc(p.tag)}</b><p>${esc(p.text)}</p></div>`).join('');

  $('loadSteps').innerHTML=t.loading_steps.map((s,i)=>
    `<div class="lstep" data-i="${i}"><span class="ic">✓</span><b>${esc(s.label)}</b><span>${esc(s.meta)}</span></div>`).join('');
  paintLoadSteps();

  $('dimRows').innerHTML=t.dim_rows.map(r=>
    `<div class="dim-row"><div class="t"><b>${esc(r.label)}</b><span style="color:${r.c}">${r.score} <span style="color:var(--faint);font-weight:400">/100</span></span></div>
     <div class="bar"><i style="--w:${r.score}%;background:${r.c}"></i></div><div class="dim-note">${esc(r.note)}</div></div>`).join('');

  $('findings').innerHTML=t.findings.map(f=>{const c=COLORS[f.k];
    return `<div class="finding"><div class="find-top"><span class="sev" style="color:${c.fg};background:${c.bg};border-color:${c.bd}">${esc(f.sev)}</span><span>${esc(f.dim)}</span></div>
    <h3>${esc(f.title)}</h3><p>${esc(f.body)}</p><div class="affected">${esc(f.affected)}</div></div>`;}).join('');

  $('rewrites').innerHTML=t.rewrites.map(r=>
    `<div class="rw"><div class="rw-head"><span class="id">${r.id}</span><span class="sec">${esc(r.sec)}</span><span class="tag">${esc(r.tag)}</span><span class="imp">${esc(r.imp)} ↑</span></div>
     <div class="rw-grid">
       <div class="rw-cell before"><small>${esc(t.before_label)}</small><p>${esc(r.before)}</p><div class="mini-chips">${r.issues.map(i=>`<span class="mc-issue">${esc(i)}</span>`).join('')}</div></div>
       <div class="rw-cell after"><small>${esc(t.after_label)}</small><p>${esc(r.after)}</p><div class="mini-chips">${r.wins.map(w=>`<span class="mc-win">${esc(w)}</span>`).join('')}</div></div>
     </div></div>`).join('');

  $('buckets').innerHTML=t.buckets.map(b=>
    `<div class="bucket"><div class="bucket-h"><b>${esc(b.title)}</b><span>${b.hits}/${b.total}</span></div>
     <div class="bk-chips">${b.items.map(([l,k])=>{const c=COLORS[k];return `<span style="color:${c.fg};background:${c.bg};border-color:${c.bd}">${esc(l)}</span>`;}).join('')}</div></div>`).join('');
}

function onResumeInput(){
  const t=I18N[lang], v=$('resume').value;
  $('resumeCount').textContent=`${v.length} ${t.count_unit}`;
  $('genBtn').disabled = v.trim().length===0;
}

function loadSample(autoRun){
  const t=I18N[lang];
  $('resume').value=t.sample_resume;
  $('jd').value=t.sample_jd;
  onResumeInput();
  if(autoRun) setTimeout(runDiagnosis,80);
}

function setPhase(p){
  phase=p;
  $('phase-input').hidden = p!=='input';
  $('phase-loading').hidden = p!=='loading';
  $('phase-report').hidden = p!=='report';
  $('stp2').classList.toggle('on', p==='report');
  window.scrollTo({top:0,behavior:'instant'});
}

function paintLoadSteps(){
  document.querySelectorAll('.lstep').forEach(el=>{
    const i=+el.dataset.i;
    el.classList.toggle('done', i<loadStep);
    el.classList.toggle('active', i===loadStep);
  });
}

function runDiagnosis(){
  loadStep=0; setPhase('loading'); paintLoadSteps();
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const seq = reduced ? [80,160,240,320] : [700,1500,2300,2900];
  timers=[
    setTimeout(()=>{loadStep=1;paintLoadSteps();},seq[0]),
    setTimeout(()=>{loadStep=2;paintLoadSteps();},seq[1]),
    setTimeout(()=>{loadStep=3;paintLoadSteps();},seq[2]),
    setTimeout(showReport,seq[3])
  ];
}

function cancelDiagnosis(){ timers.forEach(clearTimeout); setPhase('input'); }
function backToInput(){ setPhase('input'); }

function showReport(){
  setPhase('report');
  $('sumCard').classList.remove('shown');
  // 分数滚动 + 进度条动画
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  requestAnimationFrame(()=>$('sumCard').classList.add('shown'));
  const el=$('bigScore'), target=86;
  if(reduced){ el.textContent=target; return; }
  const t0=performance.now(), dur=850;
  (function tick(now){
    const k=Math.min(1,(now-t0)/dur), e=1-Math.pow(1-k,3);
    el.textContent=Math.round(target*e);
    if(k<1) requestAnimationFrame(tick);
  })(t0);
}

function toast(){
  const el=$('toast');
  el.textContent=I18N[lang].toast_msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2600);
}

function setLang(l){ lang=l; render(); }

render();
// 支持 ?sample=1 直接看样例报告（落地页“看样例报告”按钮会带此参数进来）
try{ if(new URLSearchParams(location.search).get('sample')==='1') loadSample(true); }catch(e){}
</script>
</body>
</html>
